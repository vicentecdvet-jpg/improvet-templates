<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Card Catálogo WhatsApp — Template</title>
<style>
  :root {
    --ink: #1B2430;
    --gold: #C79A3A;
    --gold-light: #E8D5A3;
    --cream: #FAF7F0;
    --teal: #2F5D62;
    --slate: #3C4550;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Work Sans', Arial, sans-serif;
    background: #ddd;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }
  /* Card em proporção 1:1 — formato recomendado pelo catálogo do WhatsApp Business (1080x1080) */
  .card {
    width: 540px;
    height: 540px;
    background: var(--ink);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 36px;
  }
  .scale-bar { display: flex; align-items: center; gap: 2px; }
  .scale-bar span { display: block; width: 1px; height: 8px; background: var(--gold); opacity: 0.7; }
  .scale-bar span:nth-child(4n) { height: 13px; opacity: 1; }

  .top-row {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .brand-tag {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
  }

  .middle {
    text-align: left;
  }
  .category {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal-light, var(--gold-light));
    margin-bottom: 10px;
  }
  .product-name {
    font-family: 'Georgia', serif;
    font-size: 40px;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .product-desc {
    font-size: 14px;
    color: #C7CCD6;
    max-width: 380px;
    line-height: 1.5;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid rgba(232,213,163,0.25);
    padding-top: 18px;
  }
  .price-block .label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold-light);
  }
  .price-block .value {
    font-family: 'Georgia', serif;
    font-size: 30px;
    color: var(--gold);
    margin-top: 2px;
  }
  .cta-tag {
    background: var(--gold);
    color: var(--ink);
    font-weight: 700;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="top-row">
    <div class="scale-bar">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span>
    </div>
    <div class="brand-tag">[SEU NOME/MARCA]</div>
  </div>

  <div class="middle">
    <div class="category">[Categoria — ex: Ultrassonografia]</div>
    <div class="product-name">[Nome do<br>Serviço]</div>
    <div class="product-desc">[Descrição curta do que está incluso — ex: Avaliação completa de órgãos abdominais, laudo em até 24h, discussão do caso com o veterinário responsável.]</div>
  </div>

  <div class="bottom-row">
    <div class="price-block">
      <div class="label">A PARTIR DE</div>
      <div class="value">R$ [000]</div>
    </div>
    <div class="cta-tag">Agendar</div>
  </div>
</div>

</body>
</html>
